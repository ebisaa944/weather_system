{% extends "weather/base.html" %}

{% block title %}Settings - Weather System{% endblock %}

{% block content %}
<section class="page">
    <header class="page-header">
        <h1>Settings</h1>
        <p>Customize your preferences.</p>
    </header>

    <form method="post" class="card">
        {% csrf_token %}
        <div class="card-body">
            <h2>Preferences</h2>

            <label class="field">
                <span>Temperature Unit</span>
                <select name="temperature_unit">
                    <option value="celsius" {% if settings.temperature_unit == "celsius" %}selected{% endif %}>Celsius</option>
                    <option value="fahrenheit" {% if settings.temperature_unit == "fahrenheit" %}selected{% endif %}>Fahrenheit</option>
                </select>
            </label>

            <label class="field">
                <span>Theme</span>
                <select name="theme">
                    <option value="auto" {% if settings.theme == "auto" %}selected{% endif %}>Auto</option>
                    <option value="light" {% if settings.theme == "light" %}selected{% endif %}>Light</option>
                    <option value="dark" {% if settings.theme == "dark" %}selected{% endif %}>Dark</option>
                </select>
            </label>

            <label class="field checkbox">
                <input type="checkbox" name="email_notifications" {% if settings.email_notifications %}checked{% endif %}>
                <span>Email notifications</span>
            </label>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </div>
    </form>
</section>
{% endblock %}
